<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BestellApp</title>
    <link rel="icon" type="image/x-icon" href="./assets/icons/burger_house_logo.png"/>
    <link rel="stylesheet" href="./assets/styles/standard.css" />
    <link rel="stylesheet" href="./assets/styles/fonts.css" />
    <link rel="stylesheet" href="style.css" />
    <script src="script.js"></script>
</head>
<body>
    <nav>
        <img class="bestell-app-logo" src="./assets/icons/bestell_app_logo.png" alt="Bestell App Logo">
        <img class="burger-menu" src="./assets/icons/burger_menu_static.png" alt="Burger Menu">
    </nav>
    <header>
        <img class="hero-image" src="./assets/img/hero.png" alt="">
        <img class="burger-house-logo" src="./assets/icons/burger_house_logo.png" alt="">
        <section class="hero-title">
            <h1>Burger<span class="hero-title-grey">House</span></h1>
            <div class="rating">
                <img class="title-star" src="./assets/icons/star.png" alt="">
                <p class="rating-stars">4,1</p>
                <p class="rating-amount">(317)</p>
            </div>
        </section>
        <h2>The best Burgers, Pizza and Greens, all in one great place.</h2>
    </header>
<main>
    <section class="category-section">
        <div class="category-bar">
            <img class="category-icon" src="./assets/icons/burger_icon.png" alt="Burger Icon">
            <h3 class="category-text">Burger & Sandwiches</h3>
        </div>
    </section>
    <section class="category-section">
        <div class="category-bar">
            <img class="category-icon" src="./assets/icons/pizza_icon.png" alt="Pizza Icon">
            <h3 class="category-text">Pizza (30cm)</h3>
        </div>
    </section>
    <section class="category-section">
        <div class="category-bar">
            <img class="category-icon" src="./assets/icons/salad_icon.png" alt="Salad Icon">
            <h3 class="category-text">Salad</h3>
        </div>
    </section>
</main>
    
</body>
</html>
